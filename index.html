<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEADCIRCUS</title>
    
    <meta property="og:url"           content="https://VOTRE_URL_ICI" />
    <meta property="og:type"          content="website" />
    <meta property="og:title"         content="HEADCIRCUS WACK-A-FRIEND" />
    <meta property="og:description"   content="J'ai joué à HEADCIRCUS ! Peux-tu battre mon score ?" />
    <meta property="og:image"         content="https://i.imgur.com/L63mJ4d.png" /> 
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="toolbox">
        <h3>Choisis ton assommoir :</h3>
        <div class="tool" id="hammer" data-tool="hammer">
            <img src="images/hammer.png" alt="Masse de cirque">
        </div>
        <div class="tool" id="bat" data-tool="bat">
            <img src="images/bat.png" alt="Batte de baseball">
        </div>
        <div class="tool" id="club" data-tool="club">
            <img src="images/club.png" alt="Bâton de Cro-Magnon">
        </div>
    </div>

    <div class="game-container">
        <h1>Frappe-la-Tête !</h1>

        <div id="status"></div> 

        <div class="info-jeu">
            <h2>Score : <span id="score">0</span></h2>
            <h2>Temps restant : <span id="temps-restant">30</span></h2>
        </div>

        <button id="fbLoginBtn">Se connecter avec Facebook</button>

        <label for="imageUpload">Ou choisir un fichier :</label>
        <input type="file" id="imageUpload" accept="image/png, image/jpeg">
        <p id="loadingMessage"></p>

        <button id="startButton">Démarrer le Jeu</button>
        <button id="shareBtn" style="display: none;">Partager mon Score</button>

        <canvas id="faceCanvas"></canvas>

        <div class="grille">
            <div class="case" id="1"></div>
            <div class="case" id="2"></div>
            <div class="case" id="3"></div>
            <div class="case" id="4"></div>
            <div class="case" id="5"></div>
            <div class="case" id="6"></div>
            <div class="case" id="7"></div>
            <div class="case" id="8"></div>
            <div class="case" id="9"></div>
        </div>
    </div>

    <audio id="backgroundMusic" loop></audio>

    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="script.js"></script>

    <script>
      window.fbAsyncInit = function() {
        FB.init({
          appId      : 'VOTRE_ID_D_APP_ICI', // ⚠️ REMPLACEZ PAR VOTRE VRAI ID D'APP !
          cookie     : true,
          xfbml      : true,
          version    : 'v19.0'
        });
        
        FB.getLoginStatus(function(response) {
            console.log("Statut de connexion FB vérifié.", response);
            initializeApp();
        });
      };

      (function(d, s, id){
         var js, fjs = d.getElementsByTagName(s)[0];
         if (d.getElementById(id)) {return;}
         js = d.createElement(s); js.id = id;
         js.src = "https://connect.facebook.net/fr_CA/sdk.js";
         fjs.parentNode.insertBefore(js, fjs);
       }(document, 'script', 'facebook-jssdk'));
    </script>
</body>
</html>
